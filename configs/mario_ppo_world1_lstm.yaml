params:
  seed: 42

  algo:
    name: a2c_discrete

  model:
    name: discrete_a2c

  network:
    name: actor_critic
    separate: False
    space:
      discrete:

    cnn:
      type: conv2d
      activation: elu
      initializer:
        name: orthogonal_initializer
        gain: 1.41421356237
      convs:
        - filters: 32
          kernel_size: 8
          strides: 4
          padding: 0
        - filters: 64
          kernel_size: 4
          strides: 2
          padding: 0
        - filters: 64
          kernel_size: 3
          strides: 1
          padding: 0

    mlp:
      units: [512]
      activation: elu
      initializer:
        name: orthogonal_initializer
        gain: 1.41421356237

    rnn:
      name: lstm
      units: 256
      layers: 1
      before_mlp: False
      layer_norm: True

  config:
    name: Mario_W1_LSTM
    env_name: mario_custom
    score_to_win: 100000
    normalize_value: True
    normalize_input: False
    reward_shaper:
      scale_value: 1.0
    normalize_advantage: True
    gamma: 0.99
    tau: 0.95
    learning_rate: 2.5e-4
    lr_schedule: adaptive
    kl_threshold: 0.008
    grad_norm: 0.5
    entropy_coef: 0.01
    truncate_grads: True
    e_clip: 0.1
    clip_value: True
    num_actors: 16
    horizon_length: 128
    minibatch_size: 256
    mini_epochs: 4
    critic_coef: 0.5
    seq_length: 8
    max_epochs: 5000
    use_diagnostics: True
    save_frequency: 200
    save_best_after: 200
    print_stats: True
    device: cuda:0
    multi_gpu: False

    env_config:
      name: SuperMarioBros-1-1-v0
      action_type: complex
      episode_life: False
      stage_bonus: 500
      idle_penalty: 0.5
      idle_threshold: 10
      skip: 4
      sticky_actions: 0.0
      random_stages:
        - '1-1'
        - '1-2'
        - '1-3'
        - '1-4'

    player:
      render: False
      games_num: 10
      deterministic: True
      n_game_life: 1
